name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e '.[dev,onset]'
    - name: Lint with ruff
      run: |
        ruff check .
        ruff format --check .
    - name: Type check with mypy
      run: |
        mypy src
    - name: Test with pytest
      run: |
        pytest --cov=lrc_tools --cov-report=xml tests/
    - name: Upload coverage
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: coverage.xml
